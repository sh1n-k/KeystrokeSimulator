name: Verify

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv python install 3.14
      - run: uv lock --check
      - run: uv sync --locked
      - run: uv run -m scripts.verify
      - if: runner.os == 'macOS'
        env:
          RUN_GUI_TESTS: "1"
        run: >-
          uv run -m unittest
          tests.test_quick_event_editor.TestQuickEventEditorLayout
          tests.test_keystroke_settings.TestKeystrokeSettings
